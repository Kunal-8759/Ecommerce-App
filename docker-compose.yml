# docker-compose version 
version: "3.8"

# Services = the containers we want to run together
services:
  # Service 1 : MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ecommerce_mysql
    # Restart policy: always restart if it crashes or server reboots
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE} 
    ports:
      - "3307:3306"
    # Named volume — persists MySQL data even if the container is deleted
    # Without this, all your data disappears when you stop the container
    volumes:
      - mysql_data:/var/lib/mysql

    # Health check — docker-compose waits until MySQL is actually ready
    # before starting the app container
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s   # check every 10 seconds
      timeout: 5s     # fail if no response in 5 seconds
      retries: 5      # retry 5 times before marking as unhealthy

  # Service 2 : Spring Boot Application
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Pass all necessary environment variables to the app
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      APP_NAME: ${APP_NAME}
    
    # Wait for MySQL starts before starting the app
    depends_on:
      mysql:
        condition: service_healthy

    # Mount logs directory from Container to our Machine
    #So we can read logs even if container is stopped(or before going into the container)
    volumes:
      - ./logs:/app/logs

# Named volumes — persisted storage managed by Docker
# mysql_data persists database files between container restarts
volumes:
  mysql_data: