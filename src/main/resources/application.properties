# ─── Logging ───────────────────────────────────────────────────────

# Root log level — only WARN and above from Spring internals
logging.level.root=WARN

# Your app logs — INFO and above
logging.level.com.ecommerce.ecommerce_backend=INFO

# Log pattern for console
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Log to file — rotates daily, keeps 30 days
logging.file.name=logs/ecommerce.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.max-file-size=10MB